<!DOCTYPE html>
<html lang="th">
<!-- หน้าเพิ่มสมาชิกใหม่เชื่อมฟอร์มข้อมูลบุคคลกับ API เพื่อสร้างสมาชิกและใช้ข้อมูลอ้างอิงจากฐานข้อมูล -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เพิ่มสมาชิกใหม่ | กองทุนสวัสดิการชุมชน</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style> body { font-family: 'Prompt', sans-serif; } </style>
    <!-- โหลด shared frontend สำหรับเลขสมาชิกอัตโนมัติ, reference data และการส่งฟอร์มไป backend -->
    <script src="services/frontend.js"></script>
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden">

    <aside class="w-64 bg-blue-800 text-white flex flex-col shadow-lg z-10 shrink-0">
        <div class="p-6 text-center border-b border-blue-700">
            <h1 class="text-xl font-bold">กองทุนสวัสดิการชุมชน</h1>
            <p class="text-xs text-blue-300 mt-1">เทศบาลนครนครศรีธรรมราช</p>
        </div>
        <nav class="flex-grow p-4 space-y-2">
            <a href="dashboard.html" class="block w-full text-left px-4 py-3 hover:bg-blue-700 rounded-lg transition">🏠 แดชบอร์ด</a>
            <a href="members.html" class="block w-full text-left px-4 py-3 bg-blue-900 hover:bg-blue-700 rounded-lg transition font-semibold">👥 จัดการสมาชิก</a>
            <a href="receipt.html" class="block w-full text-left px-4 py-3 hover:bg-blue-700 rounded-lg transition">💰 รับเงินสมทบ</a>
            <a href="expense.html" class="block w-full text-left px-4 py-3 hover:bg-blue-700 rounded-lg transition">💸 จ่ายสวัสดิการ</a>
            <a href="reports.html" id="menu-reports" class="block w-full text-left px-4 py-3 hover:bg-blue-700 rounded-lg transition">📊 รายงาน</a>
        </nav>
        <div class="p-4 border-t border-blue-700 text-sm bg-blue-900">
            <p class="mb-2 text-gray-300">ผู้ใช้งาน: <br><span id="displayUserName" class="font-bold text-green-400 text-base">Loading...</span></p>
            <button id="logoutBtn" class="w-full bg-red-500 hover:bg-red-600 px-4 py-2 rounded-lg transition font-semibold text-white shadow">ออกจากระบบ</button>
        </div>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto w-full">
        <div class="bg-white p-8 rounded-xl shadow-md border-t-4 border-green-500 max-w-4xl mx-auto">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">ลงทะเบียนสมาชิกใหม่</h2>

            <form id="addMemberForm" class="space-y-6">
                <h3 class="text-lg font-semibold text-blue-600 border-b pb-2">1. ข้อมูลส่วนตัว</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">รหัสสมาชิก (อัตโนมัติ)</label>
                        <input type="text" id="member_code" readonly class="w-full px-4 py-2 bg-gray-100 border rounded-lg text-gray-500 font-bold focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">เลขบัตรประชาชน *</label>
                        <input type="text" id="national_id" required maxlength="13" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">คำนำหน้า *</label>
                        <select id="prefix_id" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                            <option value="">-- กำลังโหลด... --</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">ชื่อ *</label>
                        <input type="text" id="first_name" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">นามสกุล *</label>
                        <input type="text" id="last_name" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">วันเกิด *</label>
                        <input type="date" id="birth_date" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>

                <h3 class="text-lg font-semibold text-blue-600 border-b pb-2 mt-6">2. ที่อยู่และการติดต่อ</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 mb-1">ที่อยู่ปัจจุบัน *</label>
                        <input type="text" id="address" required placeholder="บ้านเลขที่ หมู่ ซอย ถนน" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">เบอร์โทรศัพท์</label>
                        <input type="text" id="phone" maxlength="10" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">ชุมชนที่สังกัด *</label>
                        <select id="community_id" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                            <option value="">-- กำลังโหลดข้อมูลชุมชน... --</option>
                        </select>
                    </div>
                </div>

                <div class="flex justify-end space-x-4 pt-6 border-t">
                    <a href="members.html" class="px-6 py-2 border rounded-lg text-gray-600 hover:bg-gray-100 transition">ยกเลิก</a>
                    <button type="submit" id="submitBtn" class="px-6 py-2 bg-green-600 hover:bg-green-700 text-white font-bold rounded-lg transition shadow-md">บันทึกข้อมูลสมาชิก</button>
                </div>
            </form>
            <div id="alertBox" class="hidden mt-4 px-4 py-3 rounded-lg text-sm text-center font-medium"></div>
        </div>
    </main>

    <script>
        // AddMemberPage เตรียมเลขสมาชิก/ตัวเลือกอ้างอิง แล้วแปลงข้อมูลฟอร์มเป็น payload สำหรับ POST /members
        class AddMemberPage extends WelfareApp.BasePage {
            constructor() {
                super();
                this.form = this.getElement('addMemberForm');
                this.submitButton = this.getElement('submitBtn');
                this.alertBox = new WelfareApp.AlertBoxController(this.getElement('alertBox'));
            }

            init() {
                const user = this.session.requireLogin();
                if (!user) {
                    return;
                }

                this.setUserDisplay();
                this.bindLogoutButton();
                this.applyRoleVisibility(user);
                this.loadInitialData();
                this.form.addEventListener('submit', (event) => this.handleSubmit(event));
            }

            applyRoleVisibility(user) {
                if (user.role === 'officer') {
                    this.getElement('menu-reports').style.display = 'none';
                }
            }

            async loadInitialData() {
                await Promise.all([
                    this.loadNextMemberNumber(),
                    this.loadReferences()
                ]);
            }

            async loadNextMemberNumber() {
                try {
                    const result = await this.api.get('/utils/next-number/member');
                    this.getElement('member_code').value = result.next_number || '';
                } catch (error) {
                    this.getElement('member_code').value = 'โหลดไม่สำเร็จ';
                }
            }

            async loadReferences() {
                try {
                    const result = await this.api.get('/references');
                    this.populateOptions('prefix_id', result.data.prefixes, 'เลือกคำนำหน้า');
                    this.populateOptions('community_id', result.data.communities, 'เลือกชุมชน');
                } catch (error) {
                    this.populateOptions('prefix_id', [], 'โหลดไม่สำเร็จ');
                    this.populateOptions('community_id', [], 'โหลดไม่สำเร็จ');
                }
            }

            populateOptions(elementId, items, placeholder) {
                const element = this.getElement(elementId);
                element.innerHTML = `<option value="">-- ${placeholder} --</option>`;
                items.forEach((item) => {
                    element.insertAdjacentHTML('beforeend', `<option value="${item.id}">${item.name}</option>`);
                });
            }

            buildPayload() {
                return {
                    member_code: this.getElement('member_code').value,
                    national_id: this.getElement('national_id').value,
                    prefix_id: Number(this.getElement('prefix_id').value),
                    first_name: this.getElement('first_name').value.trim(),
                    last_name: this.getElement('last_name').value.trim(),
                    birth_date: this.getElement('birth_date').value,
                    join_date: new Date().toISOString().split('T')[0],
                    is_disabled: false,
                    address: this.getElement('address').value.trim(),
                    subdistrict_id: 1,
                    community_id: Number(this.getElement('community_id').value),
                    occupation_id: 1,
                    marital_status_id: 1,
                    phone: this.getElement('phone').value.trim(),
                    beneficiary_1_name: '-',
                    relationship_1_id: 1
                };
            }

            async handleSubmit(event) {
                event.preventDefault();
                const restoreButton = this.withButtonLoading(this.submitButton, 'กำลังบันทึก...');
                this.alertBox.hide();

                try {
                    await this.api.post('/members', this.buildPayload());
                    window.alert('เพิ่มสมาชิกสำเร็จ');
                    window.location.href = 'members.html';
                } catch (error) {
                    restoreButton();
                    this.alertBox.showError(error.message);
                }
            }
        }

        new AddMemberPage().init();
    </script>
</body>
</html>
