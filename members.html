<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายชื่อสมาชิก | กองทุนสวัสดิการชุมชน</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style> body { font-family: 'Prompt', sans-serif; } </style>
    <script src="services/frontend.js"></script>
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden">

    <aside class="w-64 bg-blue-800 text-white flex flex-col shadow-lg z-10 shrink-0">
        <div class="p-6 text-center border-b border-blue-700">
            <h1 class="text-xl font-bold">กองทุนสวัสดิการชุมชน</h1>
            <p class="text-xs text-blue-300 mt-1">เทศบาลนครนครศรีธรรมราช</p>
        </div>
        <nav class="flex-grow p-4 space-y-2">
            <a href="dashboard.html" class="block w-full text-left px-4 py-3 hover:bg-blue-700 rounded-lg transition">🏠 แดชบอร์ด</a>
            <a href="members.html" class="block w-full text-left px-4 py-3 bg-blue-900 hover:bg-blue-700 rounded-lg transition font-semibold">👥 จัดการสมาชิก</a>
            <a href="receipt.html" class="block w-full text-left px-4 py-3 hover:bg-blue-700 rounded-lg transition">💰 รับเงินสมทบ</a>
            <a href="expense.html" class="block w-full text-left px-4 py-3 hover:bg-blue-700 rounded-lg transition">💸 จ่ายสวัสดิการ</a>
            <a href="reports.html" id="menu-reports" class="block w-full text-left px-4 py-3 hover:bg-blue-700 rounded-lg transition">📊 รายงาน</a>
        </nav>
        <div class="p-4 border-t border-blue-700 text-sm bg-blue-900">
            <p class="mb-2 text-gray-300">ผู้ใช้งาน: <br><span id="displayUserName" class="font-bold text-green-400 text-base">Loading...</span></p>
            <button id="logoutBtn" class="w-full bg-red-500 hover:bg-red-600 px-4 py-2 rounded-lg transition font-semibold text-white shadow">ออกจากระบบ</button>
        </div>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto w-full">
        <div class="flex justify-between items-end mb-6">
            <div>
                <h2 class="text-2xl font-bold text-gray-800">จัดการรายชื่อสมาชิก</h2>
                <p class="text-gray-500 text-sm mt-1">ค้นหาและดูรายละเอียดสมาชิกทั้งหมดในระบบ</p>
            </div>
            <a href="add-member.html" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg font-semibold shadow transition">
                เพิ่มสมาชิกใหม่
            </a>
        </div>

        <div class="bg-white p-4 rounded-t-xl shadow-sm border-b">
            <div class="flex gap-4">
                <input type="text" id="searchInput" placeholder="พิมพ์ชื่อ นามสกุล หรือเลขสมาชิก" class="flex-grow px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button id="searchBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg transition">ค้นหา</button>
            </div>
        </div>

        <div class="bg-white shadow-md rounded-b-xl overflow-hidden">
            <table class="min-w-full text-left border-collapse">
                <thead class="bg-gray-100 text-gray-700">
                    <tr>
                        <th class="px-6 py-3 border-b font-semibold">รหัสสมาชิก</th>
                        <th class="px-6 py-3 border-b font-semibold">ชื่อ - นามสกุล</th>
                        <th class="px-6 py-3 border-b font-semibold">ชุมชน</th>
                        <th class="px-6 py-3 border-b font-semibold">สถานะ</th>
                        <th class="px-6 py-3 border-b font-semibold text-center">จัดการ</th>
                    </tr>
                </thead>
                <tbody id="memberTableBody" class="text-gray-600">
                    <tr><td colspan="5" class="px-6 py-8 text-center text-gray-400">กำลังโหลดข้อมูล...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        class MembersPage extends WelfareApp.BasePage {
            constructor() {
                super();
                this.tableBody = this.getElement('memberTableBody');
                this.searchInput = this.getElement('searchInput');
                this.searchButton = this.getElement('searchBtn');
            }

            init() {
                const user = this.session.requireLogin();
                if (!user) {
                    return;
                }

                this.setUserDisplay();
                this.bindLogoutButton();
                this.applyRoleVisibility(user);
                this.bindEvents();
                this.fetchMembers();
            }

            applyRoleVisibility(user) {
                if (user.role === 'officer') {
                    this.getElement('menu-reports').style.display = 'none';
                }
            }

            bindEvents() {
                this.searchButton.addEventListener('click', () => this.fetchMembers(this.searchInput.value.trim()));
                this.searchInput.addEventListener('keypress', (event) => {
                    if (event.key === 'Enter') {
                        this.fetchMembers(this.searchInput.value.trim());
                    }
                });
            }

            async fetchMembers(searchQuery = '') {
                this.renderLoading();

                try {
                    const result = searchQuery
                        ? await this.api.get(`/members/search?q=${encodeURIComponent(searchQuery)}`)
                        : await this.api.get('/members');

                    this.renderMembers(result.data || []);
                } catch (error) {
                    this.tableBody.innerHTML = '<tr><td colspan="5" class="px-6 py-8 text-center text-red-500">เชื่อมต่อ API ล้มเหลว</td></tr>';
                }
            }

            renderLoading() {
                this.tableBody.innerHTML = '<tr><td colspan="5" class="px-6 py-8 text-center text-gray-400">กำลังโหลดข้อมูล...</td></tr>';
            }

            renderMembers(members) {
                if (!members.length) {
                    this.tableBody.innerHTML = '<tr><td colspan="5" class="px-6 py-8 text-center text-gray-500">ไม่พบข้อมูลสมาชิก</td></tr>';
                    return;
                }

                this.tableBody.innerHTML = members.map((member) => {
                    const status = this.getStatusConfig(member.status);
                    const fullName = `${member.prefix_name || ''}${member.first_name} ${member.last_name}`;

                    return `
                        <tr class="hover:bg-gray-50 transition border-b last:border-0">
                            <td class="px-6 py-4 font-medium text-blue-600">${member.member_code}</td>
                            <td class="px-6 py-4">${fullName}</td>
                            <td class="px-6 py-4">${member.community_name || '- ไม่ระบุ -'}</td>
                            <td class="px-6 py-4"><span class="px-3 py-1 rounded-full text-xs font-semibold ${status.className}">${status.label}</span></td>
                            <td class="px-6 py-4 text-center">
                                <button type="button" class="text-blue-500 hover:underline text-sm" data-member-id="${member.id}">ดูประวัติ</button>
                            </td>
                        </tr>
                    `;
                }).join('');

                this.tableBody.querySelectorAll('[data-member-id]').forEach((button) => {
                    button.addEventListener('click', () => {
                        window.location.href = `member-detail.html?id=${button.dataset.memberId}`;
                    });
                });
            }

            getStatusConfig(status) {
                const statusMap = {
                    active: { label: 'ปกติ', className: 'bg-green-100 text-green-800' },
                    deceased: { label: 'เสียชีวิต', className: 'bg-red-100 text-red-800' },
                    cancelled: { label: 'ลาออก', className: 'bg-red-100 text-red-800' },
                    expired: { label: 'พ้นสภาพ', className: 'bg-red-100 text-red-800' }
                };

                return statusMap[status] || statusMap.cancelled;
            }
        }

        new MembersPage().init();
    </script>
</body>
</html>
