<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตั้งรหัสผ่าน | กองทุนสวัสดิการชุมชนฯ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style> body { font-family: 'Prompt', sans-serif; } </style>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md border-t-4 border-indigo-500">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800">ตั้งค่ารหัสผ่านใหม่</h1>
            <p class="text-gray-500 text-sm mt-1">สำหรับเจ้าหน้าที่กองทุนสวัสดิการชุมชน</p>
        </div>

        <form id="setPasswordForm" class="space-y-4">
            <div>
                <label class="block text-gray-700 font-semibold mb-1">รหัสเจ้าหน้าที่</label>
                <input type="text" id="emp_code" required placeholder="เช่น 5200002" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div>
                <label class="block text-gray-700 font-semibold mb-1">รหัสผ่านใหม่</label>
                <input type="password" id="new_password" required placeholder="กำหนดรหัสผ่าน 6 ตัวขึ้นไป" minlength="6" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div>
                <label class="block text-gray-700 font-semibold mb-1">ยืนยันรหัสผ่านใหม่</label>
                <input type="password" id="confirm_password" required placeholder="พิมพ์รหัสผ่านอีกครั้ง" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            
            <button type="submit" id="submitBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg transition duration-200 mt-4">
                บันทึกรหัสผ่าน
            </button>
        </form>

        <div id="alertBox" class="hidden mt-4 px-4 py-3 rounded-lg text-sm text-center font-medium"></div>

        <div class="mt-6 text-center">
            <a href="index.html" class="text-sm text-indigo-600 hover:underline">กลับไปหน้าเข้าสู่ระบบ</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('setPasswordForm');
        const submitBtn = document.getElementById('submitBtn');
        const alertBox = document.getElementById('alertBox');

        form.addEventListener('submit', async (e) => {
            e.preventDefault(); 
            
            const empCode = document.getElementById('emp_code').value;
            const newPassword = document.getElementById('new_password').value;
            const confirmPassword = document.getElementById('confirm_password').value;

            // ตรวจสอบว่ารหัสผ่านตรงกันไหม
            if(newPassword !== confirmPassword) {
                alertBox.textContent = "รหัสผ่านไม่ตรงกัน กรุณาพิมพ์ใหม่";
                alertBox.className = "mt-4 px-4 py-3 rounded-lg text-sm text-center font-medium bg-red-100 text-red-700";
                alertBox.classList.remove('hidden');
                return;
            }

            submitBtn.textContent = "กำลังบันทึก..."; submitBtn.disabled = true; alertBox.classList.add('hidden');

            try {
                // ยิง API ไปอัปเดตรหัสผ่าน
                const response = await fetch('http://localhost:8000/api/auth/set-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ emp_code: empCode, password: newPassword })
                });
                
                const result = await response.json();

                if (result.status === 'success') {
                    alertBox.textContent = "ตั้งรหัสผ่านสำเร็จ! กรุณาเข้าสู่ระบบ";
                    alertBox.className = "mt-4 px-4 py-3 rounded-lg text-sm text-center font-medium bg-green-100 text-green-800";
                    alertBox.classList.remove('hidden');
                    
                    // รอ 2 วิ แล้วเด้งกลับไปหน้าล็อกอิน
                    setTimeout(() => { window.location.href = 'index.html'; }, 2000);
                } else {
                    throw new Error(result.message);
                }
            } catch (error) {
                alertBox.textContent = error.message;
                alertBox.className = "mt-4 px-4 py-3 rounded-lg text-sm text-center font-medium bg-red-100 text-red-700";
                alertBox.classList.remove('hidden');
                submitBtn.textContent = "บันทึกรหัสผ่าน"; submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
