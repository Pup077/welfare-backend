<!DOCTYPE html>
<html lang="th">
<!-- หน้าตั้งรหัสผ่านใช้สำหรับกำหนดรหัสให้รหัสพนักงาน โดยส่งข้อมูลไป API auth/set-password -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตั้งรหัสผ่าน | กองทุนสวัสดิการชุมชน</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style> body { font-family: 'Prompt', sans-serif; } </style>
    <!-- โหลด shared frontend เพื่อใช้ ApiClient, สถานะปุ่มโหลด และกล่องแจ้งเตือนร่วมกับหน้าอื่น -->
    <script src="services/frontend.js"></script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md border-t-4 border-indigo-500">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800">ตั้งค่ารหัสผ่านใหม่</h1>
            <p class="text-gray-500 text-sm mt-1">สำหรับเจ้าหน้าที่กองทุนสวัสดิการชุมชน</p>
        </div>

        <form id="setPasswordForm" class="space-y-4">
            <div>
                <label class="block text-gray-700 font-semibold mb-1">รหัสเจ้าหน้าที่</label>
                <input type="text" id="emp_code" required placeholder="เช่น 5200002" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div>
                <label class="block text-gray-700 font-semibold mb-1">รหัสผ่านใหม่</label>
                <input type="password" id="new_password" required placeholder="กำหนดรหัสผ่าน 6 ตัวขึ้นไป" minlength="6" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div>
                <label class="block text-gray-700 font-semibold mb-1">ยืนยันรหัสผ่านใหม่</label>
                <input type="password" id="confirm_password" required placeholder="พิมพ์รหัสผ่านอีกครั้ง" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg transition duration-200 mt-4">
                บันทึกรหัสผ่าน
            </button>
        </form>

        <div id="alertBox" class="hidden mt-4 px-4 py-3 rounded-lg text-sm text-center font-medium"></div>

        <div class="mt-6 text-center">
            <a href="index.html" class="text-sm text-indigo-600 hover:underline">กลับไปหน้าเข้าสู่ระบบ</a>
        </div>
    </div>

    <script>
        // SetPasswordPage ตรวจรหัสผ่านสองช่องให้ตรงกันก่อนส่งไป backend เพื่อบันทึก hash ของพนักงาน
        class SetPasswordPage extends WelfareApp.BasePage {
            constructor() {
                super();
                this.form = this.getElement('setPasswordForm');
                this.submitButton = this.getElement('submitBtn');
                this.alertBox = new WelfareApp.AlertBoxController(this.getElement('alertBox'));
            }

            init() {
                this.form.addEventListener('submit', (event) => this.handleSubmit(event));
            }

            validatePasswords(newPassword, confirmPassword) {
                if (newPassword !== confirmPassword) {
                    throw new Error('รหัสผ่านไม่ตรงกัน กรุณาตรวจสอบอีกครั้ง');
                }
            }

            async handleSubmit(event) {
                event.preventDefault();
                const restoreButton = this.withButtonLoading(this.submitButton, 'กำลังบันทึก...');
                this.alertBox.hide();

                try {
                    const empCode = this.getElement('emp_code').value.trim();
                    const newPassword = this.getElement('new_password').value;
                    const confirmPassword = this.getElement('confirm_password').value;

                    // ตรวจสอบก่อนยิง API เพื่อให้ผู้ใช้ได้รับ feedback เร็วขึ้น
                    this.validatePasswords(newPassword, confirmPassword);

                    await this.api.post('/auth/set-password', {
                        emp_code: empCode,
                        password: newPassword
                    });

                    this.alertBox.showSuccess('ตั้งรหัสผ่านสำเร็จ กรุณาเข้าสู่ระบบ');

                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                } catch (error) {
                    restoreButton();
                    this.alertBox.showError(error.message);
                }
            }
        }

        new SetPasswordPage().init();
    </script>
</body>
</html>
