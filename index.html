<!DOCTYPE html>
<html lang="th">
<!-- หน้านี้เป็นจุดเริ่มต้นของระบบ: รับรหัสเจ้าหน้าที่แล้วส่งไปตรวจสอบกับ API ก่อนเก็บ session ไว้ให้หน้าถัดไปใช้งานต่อ -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ | กองทุนสวัสดิการชุมชน</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style> body { font-family: 'Prompt', sans-serif; } </style>
    <!-- โหลดตัวช่วยร่วมของ frontend เพื่อใช้ ApiClient, SessionManager และกล่องแจ้งเตือนในหน้าล็อกอิน -->
    <script src="services/frontend.js"></script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-blue-700">กองทุนสวัสดิการชุมชน</h1>
            <p class="text-gray-500 text-sm">เทศบาลนครนครศรีธรรมราช</p>
        </div>

        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-gray-700 font-semibold mb-2">รหัสเจ้าหน้าที่</label>
                <input type="text" id="username" required placeholder="เช่น 5200002" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-gray-700 font-semibold mb-2">รหัสผ่าน</label>
                <input type="password" id="password" required placeholder="กรอกรหัสผ่าน" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-gray-700 font-semibold mb-2">จุดรับเงิน (Terminal)</label>
                <select id="terminal_id" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="1">จุดรับเงินที่ 1 (เคาน์เตอร์หลัก)</option>
                    <option value="2">จุดรับเงินที่ 2 (ลงพื้นที่)</option>
                </select>
            </div>
            <button type="submit" id="loginBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition duration-200">
                เข้าสู่ระบบ
            </button>
        </form>
        <div id="alertBox" class="hidden mt-4 px-4 py-3 rounded-lg text-sm text-center font-medium"></div>
    </div>

    <script>
        // LoginPage เชื่อมฟอร์มบนหน้าเว็บกับ backend endpoint /auth/login-secure และจัดการ session หลังเข้าสู่ระบบสำเร็จ
        class LoginPage extends WelfareApp.BasePage {
            constructor() {
                super();
                this.form = this.getElement('loginForm');
                this.loginButton = this.getElement('loginBtn');
                this.alertBox = new WelfareApp.AlertBoxController(this.getElement('alertBox'));
            }

            init() {
                // ถ้ามี session ค้างอยู่แล้ว ให้ไปหน้าหลักทันที
                if (this.session.getUser()) {
                    window.location.href = 'dashboard.html';
                    return;
                }

                this.form.addEventListener('submit', (event) => this.handleSubmit(event));
            }

            async handleSubmit(event) {
                event.preventDefault();
                const restoreButton = this.withButtonLoading(this.loginButton, 'กำลังตรวจสอบ...');
                this.alertBox.hide();

                try {
                    const result = await this.api.post('/auth/login-secure', {
                        username: this.getElement('username').value,
                        password: this.getElement('password').value,
                        terminal_id: this.getElement('terminal_id').value
                    });

                    this.session.saveUser(result.user);
                    this.loginButton.textContent = 'สำเร็จ กำลังเข้าสู่ระบบ...';
                    this.loginButton.classList.replace('bg-blue-600', 'bg-green-500');
                    this.alertBox.showSuccess(`ยินดีต้อนรับคุณ ${result.user.full_name}`);

                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1000);
                } catch (error) {
                    restoreButton();
                    this.alertBox.showError(
                        error.message === 'Failed to fetch'
                            ? 'เชื่อมต่อเซิร์ฟเวอร์ไม่สำเร็จ'
                            : error.message
                    );
                }
            }
        }

        new LoginPage().init();
    </script>
</body>
</html>
